name: Deploy Demo Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      API_BASE_URL: ${{ vars.BACKEND_PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate backend URL
        run: test -n "$API_BASE_URL"

      - name: Pull Vercel project
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web demo
        run: flutter build web --release --no-wasm-dry-run --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Copy Vercel config
        run: cp vercel.json build/web/vercel.json

      - name: Deploy to Vercel
        run: npx vercel@latest deploy build/web --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
